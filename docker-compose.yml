services:
  # ── Redis data stores ────────────────────────────────────────────────────────
  redis1: { image: redis:7-alpine }
  redis2: { image: redis:7-alpine }
  redis3: { image: redis:7-alpine }
  redis4: { image: redis:7-alpine }
  redis5: { image: redis:7-alpine }

  # ── HTTP node wrappers (service name = hostname used by coordinator) ─────────
  node1:
    build: .
    command: uvicorn app.node:app --host 0.0.0.0 --port 8001
    environment: { REDIS_HOST: redis1, REDIS_PORT: 6379, NODE_ID: node1 }
    ports: ["8001:8001"]
    depends_on: [redis1]

  node2:
    build: .
    command: uvicorn app.node:app --host 0.0.0.0 --port 8002
    environment: { REDIS_HOST: redis2, REDIS_PORT: 6379, NODE_ID: node2 }
    ports: ["8002:8002"]
    depends_on: [redis2]

  node3:
    build: .
    command: uvicorn app.node:app --host 0.0.0.0 --port 8003
    environment: { REDIS_HOST: redis3, REDIS_PORT: 6379, NODE_ID: node3 }
    ports: ["8003:8003"]
    depends_on: [redis3]

  node4:
    build: .
    command: uvicorn app.node:app --host 0.0.0.0 --port 8004
    environment: { REDIS_HOST: redis4, REDIS_PORT: 6379, NODE_ID: node4 }
    ports: ["8004:8004"]
    depends_on: [redis4]

  node5:
    build: .
    command: uvicorn app.node:app --host 0.0.0.0 --port 8005
    environment: { REDIS_HOST: redis5, REDIS_PORT: 6379, NODE_ID: node5 }
    ports: ["8005:8005"]
    depends_on: [redis5]

  # ── Coordinator ──────────────────────────────────────────────────────────────
  coordinator:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment: { WAL_PATH: /data/minikv.log }
    volumes: ["wal_data:/data"]
    ports: ["8000:8000"]
    depends_on: [node1, node2, node3, node4, node5]

volumes:
  wal_data: